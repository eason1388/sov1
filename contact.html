<style>

*{box-sizing:border-box}

.brand-title{font-size:2rem;color:var(--gold2);font-weight:700;letter-spacing:.08em}

.menu{display:flex;gap:28px;align-items:center;flex-wrap:wrap}

.btn{

.section{padding:72px 0}

.section-head p{color:var(--muted);max-width:840px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.card{

  border:1px solid rgba(215,181,109,.16)

.card h3{margin:.2rem 0 1rem;color:var(--gold2);font-size:1.5rem}
.card p{color:var(--muted)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.article-card{
  padding:30px;border-radius:26px;background:rgba(18,11,5,.84);border:1px solid rgba(215,181,109,.16);
  text-decoration:none;display:block
}
.article-card .tag{color:var(--gold);font-size:.9rem;letter-spacing:.15em}
.article-card h3{font-size:2rem;margin:.8rem 0 1rem;color:#f7ebcc}
.article-card p{color:var(--muted)}
.symbol-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.symbol-card{
  border-radius:24px;padding:24px;background:rgba(18,11,5,.84);border:1px solid rgba(215,181,109,.16)

.symbol-card h3{color:var(--gold2);margin:.5rem 0}
.symbol-icon{

  border:1px solid rgba(215,181,109,.28);color:var(--gold2);margin-bottom:10px

.consult-wrap{display:grid;grid-template-columns:1fr 1fr;gap:24px}
form .field{margin-bottom:14px}
input,textarea,select{
  width:100%;padding:14px 16px;border-radius:16px;border:1px solid rgba(215,181,109,.18);
  background:rgba(255,255,255,.03);color:var(--text);font:inherit

textarea{min-height:140px}
.footer{padding:46px 0;border-top:1px solid rgba(215,181,109,.12);color:var(--muted)}
.small{font-size:.95rem;color:var(--muted)}
.note{
  padding:18px 20px;border-left:3px solid var(--gold);background:rgba(255,255,255,.02);
  color:var(--muted);border-radius:12px
}
@media (max-width: 900px){
  .hero-grid,.grid-2,.consult-wrap{grid-template-columns:1fr}
  .cards,.symbol-grid{grid-template-columns:1fr 1fr}
}
@media (max-width: 640px){
  .menu{gap:16px}
  .brand-title{font-size:1.6rem}
  .cards,.symbol-grid{grid-template-columns:1fr}
}
</style>
